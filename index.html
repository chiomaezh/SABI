<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SABI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=owners-text:wght@350;400&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #FAFBE3;
      --text: #211D1D;
      --border: #423A3A;
      --font-body: 'owners-text', sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      background-color: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: var(--font-body);
      color: var(--text);
    }

    img {
      max-width: 220px;
      height: auto;
      opacity: 0;
      animation: fadeIn 1.8s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ── Footer ── */
    .site-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 32px;
      opacity: 0;
      animation: fadeIn 1.8s ease forwards;
      animation-delay: 0.4s;
      font-family: var(--font-body);
    }

    .footer-col {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .footer-col:first-child { align-items: flex-start; }
    .footer-col:nth-child(2) { align-items: center; }
    .footer-col:last-child { align-items: flex-end; }

    /* ── World clock / weather block ── */
    .station {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 184px;
    }

    .station-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .station-city {
      font-size: 20px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #000000;
      font-weight: 500;
    }

    .station-time {
      font-size: 38px;
      letter-spacing: 1px;
      color: #000000;
      font-weight: 400;
    }

    .station-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 30px;
      letter-spacing: 1px;
      color: #000000;
    }

    .station-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }
    .station-icon svg {
      width: 100%;
      height: 100%;
      stroke: #000000;
      fill: none;
      stroke-width: 1.3;
    }

    /* ── Contact block ── */
    .contact-block {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 124px;
      text-align: right;
    }

    .contact-label {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text);
      font-weight: 500;
    }

    .contact-line {
      font-size: 13px;
      color: var(--text);
      font-weight: 300;
    }

    /* ── Description block ── */
    .footer-desc {
      max-width: 280px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
      font-weight: 300;
      text-align: left;
    }

    @media (max-width: 760px) {
      .site-footer {
        position: static;
        flex-direction: column;
        align-items: center;
        gap: 28px;
        padding: 24px;
      }
      .footer-desc { text-align: center; }
      .contact-block { text-align: center; }
      .station-city { font-size: 16px; letter-spacing: 2px; }
      .station-time { font-size: 30px; }
      .station-meta { font-size: 24px; }
      .station-icon { width: 28px; height: 28px; }
      .station { width: auto; }
    }
  </style>
</head>
<body>
  <img src="sabi-logo.png" alt="SABI">

  <footer class="site-footer">
    <div class="footer-col">
      <div class="station" id="station">
        <div class="station-row">
          <span class="station-city">London</span>
        </div>
        <div class="station-row">
          <span class="station-time" data-time>--:--</span>
        </div>
        <div class="station-row">
          <span class="station-meta">
            <span class="station-icon" data-icon></span>
            <span data-temp>--°</span>
          </span>
        </div>
      </div>
    </div>

    <div class="footer-col">
      <p class="footer-desc">A creative consultancy offering strategy and design for culture-shaping presence and storytelling.</p>
    </div>

    <div class="footer-col">
      <div class="contact-block">
        <span class="contact-label">Contact</span>
        <span class="contact-line">office@sabi.london</span>
        <span class="contact-line">+44 7400 192837</span>
      </div>
    </div>
  </footer>

  <script>
    // ── Hairline weather icons, matched to Open-Meteo WMO weather codes ──
    const ICONS = {
      clear: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.2" y1="4.2" x2="5.6" y2="5.6"/><line x1="18.4" y1="18.4" x2="19.8" y2="19.8"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.2" y1="19.8" x2="5.6" y2="18.4"/><line x1="18.4" y1="5.6" x2="19.8" y2="4.2"/></svg>',
      cloud: '<svg viewBox="0 0 24 24"><path d="M6 18a4 4 0 1 1 .7-7.94A5.5 5.5 0 0 1 17.5 12H18a3.5 3.5 0 0 1 0 7H6z"/></svg>',
      fog: '<svg viewBox="0 0 24 24"><line x1="3" y1="8" x2="21" y2="8"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="16" x2="17" y2="16"/></svg>',
      rain: '<svg viewBox="0 0 24 24"><path d="M6 14a4 4 0 1 1 .7-7.94A5.5 5.5 0 0 1 17.5 8H18a3.5 3.5 0 0 1 0 7H6z"/><line x1="8" y1="18" x2="8" y2="21"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="16" y1="18" x2="16" y2="21"/></svg>',
      snow: '<svg viewBox="0 0 24 24"><path d="M6 13a4 4 0 1 1 .7-7.94A5.5 5.5 0 0 1 17.5 7H18a3.5 3.5 0 0 1 0 7H6z"/><line x1="8" y1="18" x2="8" y2="18.1"/><line x1="12" y1="19" x2="12" y2="19.1"/><line x1="16" y1="18" x2="16" y2="18.1"/></svg>',
      storm: '<svg viewBox="0 0 24 24"><path d="M6 13a4 4 0 1 1 .7-7.94A5.5 5.5 0 0 1 17.5 7H18a3.5 3.5 0 0 1 0 7H6z"/><polyline points="11 16 9 20 12 20 10 24"/></svg>'
    };

    function iconForCode(code) {
      if (code === 0) return ICONS.clear;
      if ([1,2,3].includes(code)) return ICONS.cloud;
      if ([45,48].includes(code)) return ICONS.fog;
      if ([51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code)) return ICONS.rain;
      if ([71,73,75,77,85,86].includes(code)) return ICONS.snow;
      if ([95,96,99].includes(code)) return ICONS.storm;
      return ICONS.cloud;
    }

    const LONDON = { lat: 51.5074, lon: -0.1278, tz: 'Europe/London' };
    const panel = document.querySelector('.station');

    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-GB', {
        timeZone: LONDON.tz,
        hour: '2-digit',
        minute: '2-digit'
      });
      panel.querySelector('[data-time]').textContent = timeStr;
    }

    async function updateWeather() {
      try {
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LONDON.lat}&longitude=${LONDON.lon}&current=temperature_2m,weather_code`);
        const data = await res.json();
        const temp = Math.round(data.current.temperature_2m);
        const code = data.current.weather_code;
        panel.querySelector('[data-temp]').textContent = `${temp}°`;
        panel.querySelector('[data-icon]').innerHTML = iconForCode(code);
      } catch (e) {
        panel.querySelector('[data-temp]').textContent = '—';
      }
    }

    updateClock();
    updateWeather();
    setInterval(updateClock, 1000);
    setInterval(updateWeather, 15 * 60 * 1000); // refresh weather every 15 min
  </script>
</body>
</html>
