<!DOCTYPE html>
<html>
<head>
  <title>SABI</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: #FAFBE3;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    img {
      max-width: 220px;
      height: auto;
      opacity: 0;
      animation: fadeIn 1.8s ease forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <img src="sabi-logo.png" alt="SABI">
</body>
</html>
